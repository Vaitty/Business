<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaitty — System Architecture</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── FIX: sin overflow:hidden en html/body — scroll natural ── */
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #060d1a;
      color: #e2e8f0;
    }
    #root { min-height: 100vh; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* ── Animations ── */
    @keyframes flow    { to { stroke-dashoffset: -24; } }
    @keyframes flowRev { to { stroke-dashoffset:  24; } }
    @keyframes busGlow { 0%,100%{ box-shadow:0 0 10px #38bdf833,inset 0 0 10px #38bdf811; }
                             50%{ box-shadow:0 0 22px #38bdf855,inset 0 0 18px #38bdf822; } }
    @keyframes busLine { to { stroke-dashoffset: -32; } }
    @keyframes fadeUp  { from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }
    @keyframes popIn   { from{ opacity:0; transform:scale(.96); } to{ opacity:1; transform:scale(1); } }

    .flow-a { stroke-dasharray:8 4; animation:flow    2s   linear infinite; }
    .flow-b { stroke-dasharray:6 3; animation:flow    1.5s linear infinite; }
    .flow-c { stroke-dasharray:4 4; animation:flowRev 2.5s linear infinite; }
    .flow-d { stroke-dasharray:5 5; animation:flow    3s   linear infinite; opacity:.4; }

    /* ── Sticky header & tabs ── */
    .app-header {
      position: sticky; top: 0; z-index: 200;
      background: #060d1a;
      border-bottom: 1px solid #1e293b;
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .tab-bar {
      position: sticky; top: 52px; z-index: 199;
      background: #0a0f1e;
      border-bottom: 1px solid #1e293b;
      display: flex; gap: 2px; padding: 6px 10px;
      overflow-x: auto;
    }
    .tab-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 13px; border: none; background: transparent;
      color: #64748b; font-size: 12px; font-weight: 600;
      border-radius: 8px; cursor: pointer; white-space: nowrap;
      transition: all .18s ease;
    }
    .tab-btn:hover  { background:#1e293b; color:#94a3b8; }
    .tab-btn.active { background:#1e3a5f; color:#38bdf8; }

    /* ── Content area: natural scroll ── */
    .tab-content { padding: 16px 20px 40px; animation: fadeUp .25s ease; }

    /* ── Graph container ── */
    .graph-wrap {
      position: relative;
      width: 100%; min-height: 400px; height: 460px;
      overflow: visible;  /* FIX: no hidden overflow */
    }

    /* FIX: SVG as visual layer only, pointer-events:none so HTML nodes get clicks */
    .graph-svg {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── HTML div nodes (REPLACES SVG groups — FIX for click reliability) ── */
    .graph-node {
      position: absolute;
      border-radius: 10px;
      background: #131f35;
      border: 1.5px solid;
      cursor: pointer;
      transition: transform .18s ease, filter .18s ease, border-color .18s ease;
      display: flex; align-items: center; gap: 0;
      overflow: hidden;
      user-select: none;
    }
    .graph-node:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.15); }
    .graph-node.selected { filter: brightness(1.2); }

    .node-icon-area {
      width: 44px; min-width: 44px; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: 8px; margin: 5px 0 5px 5px;
    }
    .node-text-area { flex: 1; padding: 5px 6px 5px 7px; min-width: 0; }
    .node-title { font-size: 9.5px; font-weight: 800; color: #e2e8f0; line-height: 1.3; }
    .node-status { font-size: 8.5px; margin-top: 2px; }
    .node-status-dot {
      position: absolute; top: 7px; right: 7px;
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* ── Event Bus ── */
    .event-bus {
      position: absolute;
      border-radius: 9px;
      border: 1.5px solid #38bdf877;
      background: #0d1a2e;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      animation: busGlow 2.5s ease-in-out infinite;
    }
    .bus-label {
      font-size: 11px; font-weight: 800;
      color: #38bdf8; letter-spacing: .12em;
    }

    /* ── Detail panel ── */
    .detail-panel {
      margin-top: 14px;
      border-radius: 14px; padding: 16px;
      animation: popIn .22s ease;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1.2fr;
      gap: 14px;
      margin-top: 12px;
    }

    /* ── Cards ── */
    .card { background: #1e293b; border-radius: 12px; padding: 14px; }
    .card-border { background: #1e293b; border-radius: 12px; padding: 14px; border-left: 3px solid; }

    /* ── UI Primitives ── */
    .badge {
      display: inline-flex; align-items: center;
      border-radius: 6px; padding: 2px 8px;
      font-size: 10px; font-weight: 700; white-space: nowrap;
    }
    .tag {
      display: inline-block; border-radius: 4px; padding: 1px 7px;
      font-size: 10px; font-weight: 600; white-space: nowrap;
    }
    .section-title {
      font-size: 10px; font-weight: 800; letter-spacing: .08em;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .divider { height: 1px; background: #1e293b; margin: 8px 0; }
    .bullet { display: flex; align-items: flex-start; gap: 7px; padding: 2px 0; }
    .bullet-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

    /* ── Portals callout ── */
    .portals-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    @media (max-width:700px) { .portals-grid { grid-template-columns: 1fr; } }

    /* ── Flow steps ── */
    .flow-step { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
    .fstep-icon { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .fstep-dot { border-radius: 50%; padding: 5px; border: 2px solid; }
    .fstep-line { width: 2px; height: 14px; margin-top: 2px; }

    /* ── 2-col grid helpers ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
    @media (max-width:900px) { .grid-3 { grid-template-columns: 1fr 1fr; } .detail-grid { grid-template-columns: 1fr; } }
    @media (max-width:650px) { .grid-2 { grid-template-columns: 1fr; } .grid-4 { grid-template-columns: 1fr 1fr; } }
  </style>
</head>

        <Ico name={icon} size={12} color={color}/>

    </div>
    <div style={{ paddingTop:2 }}>

    </div>

);
const TreeNode = ({ label, sub, children, color, icon, level=0, open:def=true }) => {
  const [open, setOpen] = useState(def);
  return (
    <div style={{ marginLeft:level*14 }}>
      <div style={{ display:'flex', alignItems:'flex-start', gap:5, cursor:'pointer', padding:'3px 0' }}

        {children
          ? <Ico name={open?'ChevronDown':'ChevronRight'} size={11} color={color}/>
          : <div style={{ width:11 }}/>}
        {icon && <Ico name={icon} size={12} color={color} style={{ marginTop:1 }}/>}
        <div>

        </div>
      </div>
      {open && children && <div>{children}</div>}
    </div>
