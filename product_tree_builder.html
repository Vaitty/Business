<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaitty — Product Tree Builder</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #060d1a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar {
            width: 320px;
            background-color: #0a1628;
            border-left: 1px solid #1e293b;
            overflow-y: auto;
            padding: 24px 16px;
        }

        .progress-bar {
            height: 4px;
            background-color: #1e293b;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .progress-fill {
            height: 100%;
            background-color: #38bdf8;
            transition: width 0.3s ease;
        }

        .header {
            padding: 24px 32px;
            border-bottom: 1px solid #1e293b;
            background-color: #0a1628;
            position: sticky;
            top: 4px;
            z-index: 9;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: #94a3b8;
        }

        .content {
            padding: 32px;
            flex: 1;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .step-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #38bdf8;
        }

        .step-description {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .radio-option, .checkbox-option {
            display: flex;
            align-items: flex-start;
            padding: 12px 16px;
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .radio-option:hover, .checkbox-option:hover {
            background-color: #1e293b;
            border-color: #38bdf8;
        }

        .radio-option.selected, .checkbox-option.selected {
            background-color: #1e293b;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.1);
        }

        .radio-option input, .checkbox-option input {
            margin-top: 2px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #38bdf8;
        }

        .radio-label, .checkbox-label {
            flex: 1;
            cursor: pointer;
        }

        .option-title {
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
            display: block;
        }

        .option-description {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .input-row.full {
            grid-template-columns: 1fr;
        }

        .input-field {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 14px;
        }

        .input-field:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.1);
        }

        .input-field::placeholder {
            color: #64748b;
        }

        .currency-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .category-section {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .category-title {
            font-size: 14px;
            font-weight: 600;
            color: #38bdf8;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fixed-price-badge {
            display: inline-block;
            background-color: #fbbf24;
            color: #1f2937;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: auto;
        }

        .coverage-inputs {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 12px;
        }

        .coverage-input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .coverage-input-row input,
        .coverage-input-row select {
            flex: 1;
        }

        .scheme-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .scheme-button {
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .scheme-button:hover {
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .scheme-button.selected {
            background-color: #38bdf8;
            color: #060d1a;
            border-color: #38bdf8;
        }

        .vertical-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .vertical-card {
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .vertical-card:hover {
            border-color: #38bdf8;
            background-color: #1e293b;
        }

        .vertical-card.selected {
            background-color: #38bdf8;
            border-color: #38bdf8;
            color: #060d1a;
            font-weight: 600;
        }

        .vertical-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .vertical-name {
            font-size: 13px;
            font-weight: 500;
        }

        .navigation {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            padding: 24px 32px;
            border-top: 1px solid #1e293b;
            background-color: #0a1628;
        }

        .button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .button-primary {
            background-color: #38bdf8;
            color: #060d1a;
        }

        .button-primary:hover:not(:disabled) {
            background-color: #22d3ee;
        }

        .button-primary:disabled {
            background-color: #64748b;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .button-secondary {
            background-color: #1e293b;
            color: #e2e8f0;
            border: 1px solid #334155;
        }

        .button-secondary:hover:not(:disabled) {
            background-color: #334155;
            border-color: #38bdf8;
        }

        .button-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* SIDEBAR STYLES */
        .sidebar-title {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-top: 20px;
        }

        .sidebar-title:first-child {
            margin-top: 0;
        }

        .sidebar-item {
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 8px;
            padding: 6px 8px;
            background-color: #0f172a;
            border-radius: 4px;
            border-left: 2px solid #1e293b;
            word-break: break-word;
        }

        .sidebar-item.empty {
            color: #64748b;
            font-style: italic;
        }

        .summary-section {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .summary-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 13px;
            color: #e2e8f0;
            word-break: break-word;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 12px;
        }

        .summary-table th {
            background-color: #1e293b;
            color: #38bdf8;
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #334155;
            font-weight: 600;
        }

        .summary-table td {
            padding: 8px;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
        }

        .summary-table tr:last-child td {
            border-bottom: none;
        }

        .export-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .export-buttons button {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .error-message {
            background-color: #7f1d1d;
            color: #fca5a5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            border: 1px solid #dc2626;
        }

        .success-message {
            background-color: #1f2937;
            color: #86efac;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            border: 1px solid #10b981;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 1px solid #1e293b;
                max-height: 200px;
                padding: 16px;
            }

            .main-content {
                flex: 1;
            }

            .content {
                padding: 24px;
            }

            .navigation {
                padding: 16px 24px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback } = React;

        const VERTICALS = [
            { id: 'hogar', name: 'Hogar', icon: '🏠' },
            { id: 'movilidad', name: 'Movilidad', icon: '🚗' },
            { id: 'mascotas', name: 'Mascotas', icon: '🐾' },
            { id: 'personas', name: 'Personas', icon: '👤' },
        ];

        const CATEGORIES_BY_VERTICAL = {
            hogar: [
                { id: 'emergencias', name: 'Emergencias', description: 'Plomería, Electricidad, Cerrajería, Gas, Vidrios, Aire Acondicionado' },
                { id: 'mantenimientos', name: 'Mantenimientos Preventivos', description: 'Reparaciones y servicios programados' },
                { id: 'instalaciones', name: 'Instalaciones', description: 'Nuevas instalaciones y ampliaciones' },
            ],
            movilidad: [
                { id: 'emergencias_viales', name: 'Emergencias Viales', description: 'Asistencia en ruta' },
                { id: 'asistencia_bicicleta', name: 'Asistencia Bicicleta', description: 'Soporte para bicicletas' },
            ],
            mascotas: [
                { id: 'televeterinaria', name: 'Televeterinaria', description: 'Consulta veterinaria por videollamada', isFixed: true, fixedPrice: 25000 },
                { id: 'emergencias_veterinarias', name: 'Emergencias Veterinarias', description: 'Atención de emergencias veterinarias' },
            ],
            personas: [
                { id: 'telemedicina', name: 'Telemedicina', description: 'Consulta médica por videollamada', isFixed: true, fixedPrice: 25000 },
                { id: 'salud', name: 'Salud General', description: 'Servicios de salud general' },
                { id: 'bienestar', name: 'Bienestar', description: 'Servicios de bienestar personal' },
            ],
        };

        const SCHEMES = ['Asistencia', 'Reintegro', 'Siniestro', 'Movilidad'];

        function ProductTreeBuilder() {
            const [step, setStep] = useState(1);
            const [commercializationType, setCommercializationType] = useState(null);
            const [partnerName, setPartnerName] = useState('');
            const [pricingModel, setPricingModel] = useState(null);
            const [commissionPercent, setCommissionPercent] = useState('');
            const [markupPercent, setMarkupPercent] = useState('');
            const [coverageModel, setCoverageModel] = useState(null);
            const [walletAnnual, setWalletAnnual] = useState('');
            const [walletEventCap, setWalletEventCap] = useState('');
            const [selectedVerticals, setSelectedVerticals] = useState([]);
            const [categoryCoverages, setCategoryCoverages] = useState({});
            const [categorySchemes, setCategorySchemes] = useState({});
            const [message, setMessage] = useState(null);

            const toggleVertical = (verticalId) => {
                setSelectedVerticals(prev =>
                    prev.includes(verticalId)
                        ? prev.filter(v => v !== verticalId)
                        : [...prev, verticalId]
                );
            };

            const updateCategoryCoverage = (categoryId, field, value) => {
                setCategoryCoverages(prev => ({
                    ...prev,
                    [categoryId]: {
                        ...prev[categoryId],
                        [field]: value,
                    },
                }));
            };

            const updateCategoryScheme = (categoryId, scheme) => {
                setCategorySchemes(prev => ({
                    ...prev,
                    [categoryId]: prev[categoryId] === scheme ? null : scheme,
                }));
            };

            const validateStep = () => {
                switch (step) {
                    case 1:
                        if (!commercializationType) {
                            setMessage({ type: 'error', text: 'Selecciona un tipo de comercialización' });
                            return false;
                        }
                        if (commercializationType === 'standalone' && !pricingModel) {
                            setMessage({ type: 'error', text: 'Selecciona un modelo de precio' });
                            return false;
                        }
                        if (commercializationType === 'standalone' && pricingModel === 'comision' && (!commissionPercent || parseFloat(commissionPercent) > 55)) {
                            setMessage({ type: 'error', text: 'Comisión inválida (máximo 55%)' });
                            return false;
                        }
                        return true;
                    case 2:
                        if (!coverageModel) {
                            setMessage({ type: 'error', text: 'Selecciona un modelo de cobertura' });
                            return false;
                        }
                        if (coverageModel === 'wallet' && (!walletAnnual || !walletEventCap)) {
                            setMessage({ type: 'error', text: 'Completa los montos del wallet' });
                            return false;
                        }
                        return true;
                    case 3:
                        if (selectedVerticals.length === 0) {
                            setMessage({ type: 'error', text: 'Selecciona al menos una vertical' });
                            return false;
                        }
                        return true;
                    case 4:
                        if (coverageModel === 'tradicional') {
                            for (const vertical of selectedVerticals) {
                                for (const cat of CATEGORIES_BY_VERTICAL[vertical]) {
                                    if (!cat.isFixed) {
                                        const coverage = categoryCoverages[cat.id];
                                        if (!coverage || !coverage.eventAmount) {
                                            setMessage({ type: 'error', text: `Completa el monto para ${cat.name}` });
                                            return false;
                                        }
                                    }
                                }
                            }
                        }
                        return true;
                    case 5:
                        for (const vertical of selectedVerticals) {
                            for (const cat of CATEGORIES_BY_VERTICAL[vertical]) {
                                if (!categorySchemes[cat.id]) {
                                    setMessage({ type: 'error', text: `Selecciona un esquema para ${cat.name}` });
                                    return false;
                                }
                            }
                        }
                        return true;
                    default:
                        return true;
                }
            };

            const goToStep = (newStep) => {
                setMessage(null);
                if (newStep > step && !validateStep()) {
                    return;
                }
                setStep(newStep);
            };

            const handleExportJSON = () => {
                const config = {
                    commercialization: {
                        type: commercializationType,
                        partnerName: partnerName || 'Sin nombre',
                        pricingModel: pricingModel,
                        commission: commissionPercent ? parseFloat(commissionPercent) : null,
                        markup: markupPercent ? parseFloat(markupPercent) : null,
                    },
                    coverage: {
                        model: coverageModel,
                        wallet: coverageModel === 'wallet' ? {
                            annual: parseFloat(walletAnnual) || 0,
                            eventCap: parseFloat(walletEventCap) || 0,
                        } : null,
                    },
                    verticals: selectedVerticals,
                    categories: Object.entries(categoryCoverages).map(([catId, coverage]) => ({
                        categoryId: catId,
                        vertical: selectedVerticals.find(v =>
                            CATEGORIES_BY_VERTICAL[v].some(c => c.id === catId)
                        ),
                        eventAmount: parseFloat(coverage.eventAmount) || 0,
                        eventLimit: coverage.eventLimit,
                        eventCount: parseFloat(coverage.eventCount) || null,
                        scheme: categorySchemes[catId],
                    })),
                    exportedAt: new Date().toISOString(),
                };
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `vaitty-product-${Date.now()}.json`;
                a.click();
                setMessage({ type: 'success', text: 'JSON exportado correctamente' });
            };

            const handleCopySummary = () => {
                let summary = `VAITTY PRODUCT CONFIGURATION\n`;
                summary += `=${'='.repeat(60)}\n\n`;
                summary += `COMERCIALIZACIÓN\n`;
                summary += `-${'-'.repeat(58)}\n`;
                summary += `Tipo: ${commercializationType === 'bundle' ? 'Bundle (embebido)' : 'Stand-alone (individual)'}\n`;
                if (partnerName) summary += `Partner: ${partnerName}\n`;
                if (pricingModel) summary += `Modelo de precio: ${pricingModel === 'comision' ? `Comisión ${commissionPercent}%` : `Markup ${markupPercent}%`}\n`;
                summary += `\nCOBERTURA\n`;
                summary += `-${'-'.repeat(58)}\n`;
                summary += `Modelo: ${coverageModel === 'wallet' ? 'Wallet' : 'Tradicional'}\n`;
                if (coverageModel === 'wallet') {
                    summary += `Saldo anual: $${walletAnnual}\n`;
                    summary += `Tope por evento: $${walletEventCap}\n`;
                }
                summary += `\nVERTICALES SELECCIONADAS\n`;
                summary += `-${'-'.repeat(58)}\n`;
                selectedVerticals.forEach(vid => {
                    const vertical = VERTICALS.find(v => v.id === vid);
                    summary += `• ${vertical.name}\n`;
                });
                summary += `\nCATEGORÍAS Y COBERTURAS\n`;
                summary += `-${'-'.repeat(58)}\n`;
                selectedVerticals.forEach(vid => {
                    const vertical = VERTICALS.find(v => v.id === vid);
                    summary += `\n${vertical.name}:\n`;
                    CATEGORIES_BY_VERTICAL[vid].forEach(cat => {
                        const coverage = categoryCoverages[cat.id];
                        const scheme = categorySchemes[cat.id];
                        summary += `  • ${cat.name}\n`;
                        if (cat.isFixed) {
                            summary += `    Precio fijo: $${cat.fixedPrice.toLocaleString()}\n`;
                        } else if (coverage) {
                            summary += `    Monto: $${coverage.eventAmount || 0}\n`;
                            if (coverage.eventLimit && coverage.eventLimit !== 'unlimited') {
                                summary += `    Límite: ${coverage.eventCount} ${coverage.eventLimit}\n`;
                            }
                        }
                        if (scheme) summary += `    Esquema: ${scheme}\n`;
                    });
                });
                navigator.clipboard.writeText(summary).then(() => {
                    setMessage({ type: 'success', text: 'Resumen copiado al portapapeles' });
                });
            };

            const progressPercent = (step / 6) * 100;

            return (
                <div className="container">
                    <div className="main-content">
                        <div className="progress-bar">
                            <div className="progress-fill" style={{ width: `${progressPercent}%` }}></div>
                        </div>

                        <div className="header">
                            <h1>🚀 Vaitty — Product Tree Builder</h1>
                            <p>Paso {step} de 6: {['', 'Comercialización', 'Modelo de Cobertura', 'Verticales', 'Categorías', 'Esquema de Prestación', 'Resumen'][step]}</p>
                        </div>

                        <div className="content">
                            {message && (
                                <div className={message.type === 'error' ? 'error-message' : 'success-message'}>
                                    {message.text}
                                </div>
                            )}

                            {/* STEP 1: COMMERCIALIZATION */}
                            <div className={`section ${step === 1 ? 'active' : ''}`}>
                                <h2 className="step-title">Tipo de Comercialización</h2>
                                <p className="step-description">¿Cómo se comercializará este producto?</p>

                                <div className="radio-group">
                                    <label className={`radio-option ${commercializationType === 'bundle' ? 'selected' : ''}`}>
                                        <input
                                            type="radio"
                                            name="commercialization"
                                            value="bundle"
                                            checked={commercializationType === 'bundle'}
                                            onChange={(e) => setCommercializationType(e.target.value)}
                                        />
                                        <div className="radio-label">
                                            <span className="option-title">📦 Bundle (Embebido)</span>
                                            <span className="option-description">Incorporado en una cartera existente del partner</span>
                                        </div>
                                    </label>

                                    <label className={`radio-option ${commercializationType === 'standalone' ? 'selected' : ''}`}>
                                        <input
                                            type="radio"
                                            name="commercialization"
                                            value="standalone"
                                            checked={commercializationType === 'standalone'}
                                            onChange={(e) => setCommercializationType(e.target.value)}
                                        />
                                        <div className="radio-label">
                                            <span className="option-title">🎯 Stand-alone (Individual)</span>
                                            <span className="option-description">Se vende individualmente en mostrador</span>
                                        </div>
                                    </label>
                                </div>

                                {commercializationType === 'standalone' && (
                                    <>
                                        <div style={{ marginTop: '24px' }}>
                                            <h3 className="step-title" style={{ fontSize: '16px', marginBottom: '16px' }}>Modelo de Precio</h3>
                                            <div className="radio-group">
                                                <label className={`radio-option ${pricingModel === 'comision' ? 'selected' : ''}`}>
                                                    <input
                                                        type="radio"
                                                        name="pricingModel"
                                                        value="comision"
                                                        checked={pricingModel === 'comision'}
                                                        onChange={(e) => setPricingModel(e.target.value)}
                                                    />
                                                    <div className="radio-label">
                                                        <span className="option-title">💰 Comisión % (Revenue Share)</span>
                                                        <span className="option-description">Partner retiene un % de la venta</span>
                                                    </div>
                                                </label>

                                                <label className={`radio-option ${pricingModel === 'markup' ? 'selected' : ''}`}>
                                                    <input
                                                        type="radio"
                                                        name="pricingModel"
                                                        value="markup"
                                                        checked={pricingModel === 'markup'}
                                                        onChange={(e) => setPricingModel(e.target.value)}
                                                    />
                                                    <div className="radio-label">
                                                        <span className="option-title">📈 Markup Partner</span>
                                                        <span className="option-description">Partner agrega un % al precio base</span>
                                                    </div>
                                                </label>
                                            </div>
                                        </div>

                                        {pricingModel && (
                                            <div className="form-group" style={{ marginTop: '24px' }}>
                                                {pricingModel === 'comision' && (
                                                    <div>
                                                        <label>Comisión del Partner (%)</label>
                                                        <input
                                                            type="number"
                                                            min="0"
                                                            max="55"
                                                            value={commissionPercent}
                                                            onChange={(e) => setCommissionPercent(e.target.value)}
                                                            placeholder="Ej: 30"
                                                            className="input-field"
                                                        />
                                                        <p className="currency-label">Máximo 55%</p>
                                                    </div>
                                                )}
                                                {pricingModel === 'markup' && (
                                                    <div>
                                                        <label>Markup del Partner (%)</label>
                                                        <input
                                                            type="number"
                                                            min="0"
                                                            value={markupPercent}
                                                            onChange={(e) => setMarkupPercent(e.target.value)}
                                                            placeholder="Ej: 20"
                                                            className="input-field"
                                                        />
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </>
                                )}

                                <div className="form-group" style={{ marginTop: '24px' }}>
                                    <label>Nombre del Partner (opcional)</label>
                                    <input
                                        type="text"
                                        value={partnerName}
                                        onChange={(e) => setPartnerName(e.target.value)}
                                        placeholder="Ej: Banco Galicia"
                                        className="input-field"
                                    />
                                </div>
                            </div>

                            {/* STEP 2: COVERAGE MODEL */}
                            <div className={`section ${step === 2 ? 'active' : ''}`}>
                                <h2 className="step-title">Modelo de Cobertura</h2>
                                <p className="step-description">¿Cómo se estructuran los beneficios?</p>

                                <div className="radio-group">
                                    <label className={`radio-option ${coverageModel === 'wallet' ? 'selected' : ''}`}>
                                        <input
                                            type="radio"
                                            name="coverageModel"
                                            value="wallet"
                                            checked={coverageModel === 'wallet'}
                                            onChange={(e) => setCoverageModel(e.target.value)}
                                        />
                                        <div className="radio-label">
                                            <span className="option-title">💳 WALLET</span>
                                            <span className="option-description">Saldo anual fijo + tope por evento. Sin límite de cantidad de eventos.</span>
                                        </div>
                                    </label>

                                    <label className={`radio-option ${coverageModel === 'tradicional' ? 'selected' : ''}`}>
                                        <input
                                            type="radio"
                                            name="coverageModel"
                                            value="tradicional"
                                            checked={coverageModel === 'tradicional'}
                                            onChange={(e) => setCoverageModel(e.target.value)}
                                        />
                                        <div className="radio-label">
                                            <span className="option-title">🏛️ TRADICIONAL</span>
                                            <span className="option-description">Segmentado por categoría. Cada categoría con monto y límite de eventos propios.</span>
                                        </div>
                                    </label>
                                </div>

                                {coverageModel === 'wallet' && (
                                    <div style={{ marginTop: '24px' }}>
                                        <div className="input-row">
                                            <div className="form-group">
                                                <label>Saldo Anual ($)</label>
                                                <input
                                                    type="number"
                                                    value={walletAnnual}
                                                    onChange={(e) => setWalletAnnual(e.target.value)}
                                                    placeholder="Ej: 540000"
                                                    className="input-field"
                                                />
                                            </div>
                                            <div className="form-group">
                                                <label>Tope por Evento ($)</label>
                                                <input
                                                    type="number"
                                                    value={walletEventCap}
                                                    onChange={(e) => setWalletEventCap(e.target.value)}
                                                    placeholder="Ej: 45000"
                                                    className="input-field"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* STEP 3: VERTICALS */}
                            <div className={`section ${step === 3 ? 'active' : ''}`}>
                                <h2 className="step-title">Verticales</h2>
                                <p className="step-description">Selecciona qué líneas de negocio incluir (puedes marcar varias)</p>

                                <div className="vertical-grid">
                                    {VERTICALS.map(v => (
                                        <div
                                            key={v.id}
                                            className={`vertical-card ${selectedVerticals.includes(v.id) ? 'selected' : ''}`}
                                            onClick={() => toggleVertical(v.id)}
                                        >
                                            <div className="vertical-icon">{v.icon}</div>
                                            <div className="vertical-name">{v.name}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* STEP 4: CATEGORIES & COVERAGE */}
                            <div className={`section ${step === 4 ? 'active' : ''}`}>
                                <h2 className="step-title">Categorías y Coberturas</h2>
                                <p className="step-description">
                                    {coverageModel === 'wallet'
                                        ? 'Las categorías siguientes se incluyen en el wallet. Para servicios con precio fijo, se aplica automáticamente.'
                                        : 'Define la cobertura para cada categoría.'}
                                </p>

                                {selectedVerticals.map(verticalId => {
                                    const vertical = VERTICALS.find(v => v.id === verticalId);
                                    const categories = CATEGORIES_BY_VERTICAL[verticalId];

                                    return (
                                        <div key={verticalId} style={{ marginBottom: '32px' }}>
                                            <h3 style={{ fontSize: '16px', color: '#38bdf8', marginBottom: '16px' }}>
                                                {vertical.icon} {vertical.name}
                                            </h3>

                                            {categories.map(cat => (
                                                <div key={cat.id} className="category-section">
                                                    <div className="category-title">
                                                        {cat.name}
                                                        {cat.isFixed && (
                                                            <span className="fixed-price-badge">
                                                                PRECIO FIJO: ${cat.fixedPrice.toLocaleString()}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <p style={{ fontSize: '12px', color: '#94a3b8', marginBottom: '12px' }}>
                                                        {cat.description}
                                                    </p>

                                                    {!cat.isFixed && coverageModel === 'tradicional' && (
                                                        <div className="coverage-inputs">
                                                            <div>
                                                                <label style={{ fontSize: '12px' }}>Monto por Evento ($)</label>
                                                                <input
                                                                    type="number"
                                                                    value={categoryCoverages[cat.id]?.eventAmount || ''}
                                                                    onChange={(e) => updateCategoryCoverage(cat.id, 'eventAmount', e.target.value)}
                                                                    placeholder="Ej: 34000"
                                                                    className="input-field"
                                                                />
                                                            </div>

                                                            <div>
                                                                <label style={{ fontSize: '12px' }}>Límite de Eventos</label>
                                                                <div className="coverage-input-row">
                                                                    <select
                                                                        value={categoryCoverages[cat.id]?.eventLimit || ''}
                                                                        onChange={(e) => updateCategoryCoverage(cat.id, 'eventLimit', e.target.value)}
                                                                        className="input-field"
                                                                    >
                                                                        <option value="">Selecciona tipo</option>
                                                                        <option value="monthly">Mensual Fijo</option>
                                                                        <option value="annual">Anual Fijo</option>
                                                                        <option value="unlimited">Ilimitado</option>
                                                                    </select>

                                                                    {categoryCoverages[cat.id]?.eventLimit && categoryCoverages[cat.id]?.eventLimit !== 'unlimited' && (
                                                                        <input
                                                                            type="number"
                                                                            value={categoryCoverages[cat.id]?.eventCount || ''}
                                                                            onChange={(e) => updateCategoryCoverage(cat.id, 'eventCount', e.target.value)}
                                                                            placeholder="Cantidad"
                                                                            className="input-field"
                                                                            min="1"
                                                                        />
                                                                    )}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* STEP 5: SCHEMES */}
                            <div className={`section ${step === 5 ? 'active' : ''}`}>
                                <h2 className="step-title">Esquema de Prestación</h2>
                                <p className="step-description">Define cómo se prestará cada servicio</p>

                                {selectedVerticals.map(verticalId => {
                                    const vertical = VERTICALS.find(v => v.id === verticalId);
                                    const categories = CATEGORIES_BY_VERTICAL[verticalId];

                                    return (
                                        <div key={verticalId} style={{ marginBottom: '32px' }}>
                                            <h3 style={{ fontSize: '16px', color: '#38bdf8', marginBottom: '16px' }}>
                                                {vertical.icon} {vertical.name}
                                            </h3>

                                            {categories.map(cat => (
                                                <div key={cat.id} className="category-section">
                                                    <div className="category-title">{cat.name}</div>

                                                    <div className="scheme-selector">
                                                        {SCHEMES.map(scheme => {
                                                            if (scheme === 'Movilidad' && verticalId !== 'movilidad') return null;
                                                            return (
                                                                <button
                                                                    key={scheme}
                                                                    className={`scheme-button ${categorySchemes[cat.id] === scheme ? 'selected' : ''}`}
                                                                    onClick={() => updateCategoryScheme(cat.id, scheme)}
                                                                >
                                                                    {scheme}
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* STEP 6: SUMMARY */}
                            <div className={`section ${step === 6 ? 'active' : ''}`}>
                                <h2 className="step-title">Resumen de Configuración</h2>
                                <p className="step-description">Revisa tu producto antes de exportar</p>

                                <div style={{ maxWidth: '800px' }}>
                                    <div className="category-section">
                                        <h3 style={{ fontSize: '14px', color: '#38bdf8', marginBottom: '12px' }}>📦 Comercialización</h3>
                                        <div style={{ fontSize: '13px', color: '#cbd5e1', lineHeight: '1.6' }}>
                                            <p><strong>Tipo:</strong> {commercializationType === 'bundle' ? 'Bundle (Embebido)' : 'Stand-alone (Individual)'}</p>
                                            {partnerName && <p><strong>Partner:</strong> {partnerName}</p>}
                                            {pricingModel && <p><strong>Precio:</strong> {pricingModel === 'comision' ? `Comisión ${commissionPercent}%` : `Markup ${markupPercent}%`}</p>}
                                        </div>
                                    </div>

                                    <div className="category-section">
                                        <h3 style={{ fontSize: '14px', color: '#38bdf8', marginBottom: '12px' }}>💳 Cobertura</h3>
                                        <div style={{ fontSize: '13px', color: '#cbd5e1', lineHeight: '1.6' }}>
                                            <p><strong>Modelo:</strong> {coverageModel === 'wallet' ? 'Wallet' : 'Tradicional'}</p>
                                            {coverageModel === 'wallet' && (
                                                <>
                                                    <p><strong>Saldo Anual:</strong> ${walletAnnual}</p>
                                                    <p><strong>Tope por Evento:</strong> ${walletEventCap}</p>
                                                </>
                                            )}
                                        </div>
                                    </div>

                                    <div className="category-section">
                                        <h3 style={{ fontSize: '14px', color: '#38bdf8', marginBottom: '12px' }}>📋 Servicios Incluidos</h3>
                                        <table className="summary-table">
                                            <thead>
                                                <tr>
                                                    <th>Vertical</th>
                                                    <th>Categoría</th>
                                                    <th>Cobertura</th>
                                                    <th>Esquema</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {selectedVerticals.map(verticalId => {
                                                    const vertical = VERTICALS.find(v => v.id === verticalId);
                                                    const categories = CATEGORIES_BY_VERTICAL[verticalId];

                                                    return categories.map((cat, idx) => {
                                                        const coverage = categoryCoverages[cat.id];
                                                        const scheme = categorySchemes[cat.id];
                                                        return (
                                                            <tr key={cat.id}>
                                                                {idx === 0 && <td rowSpan={categories.length}>{vertical.name}</td>}
                                                                <td>{cat.name}</td>
                                                                <td>
                                                                    {cat.isFixed
                                                                        ? `$${cat.fixedPrice.toLocaleString()}`
                                                                        : coverageModel === 'wallet'
                                                                        ? 'Wallet'
                                                                        : `$${coverage?.eventAmount || '—'}`}
                                                                </td>
                                                                <td>{scheme || '—'}</td>
                                                            </tr>
                                                        );
                                                    });
                                                })}
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="export-buttons">
                                        <button className="button button-secondary" onClick={handleCopySummary}>
                                            📋 Copiar Resumen
                                        </button>
                                        <button className="button button-primary" onClick={handleExportJSON}>
                                            ⬇️ Exportar JSON
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="navigation">
                            <button
                                className="button button-secondary"
                                onClick={() => goToStep(step - 1)}
                                disabled={step === 1}
                            >
                                ← Atrás
                            </button>
                            <span style={{ fontSize: '13px', color: '#94a3b8' }}>
                                Paso {step} de 6
                            </span>
                            <button
                                className="button button-primary"
                                onClick={() => goToStep(step + 1)}
                                disabled={step === 6}
                            >
                                {step === 6 ? '✓ Completado' : 'Siguiente →'}
                            </button>
                        </div>
                    </div>

                    {/* SIDEBAR SUMMARY */}
                    <div className="sidebar">
                        <div className="sidebar-title">📋 Resumen en Vivo</div>

                        <div className="summary-section">
                            <div className="summary-label">Comercialización</div>
                            <div className="summary-value">
                                {commercializationType
                                    ? (commercializationType === 'bundle' ? '📦 Bundle' : '🎯 Stand-alone')
                                    : <span className="empty">Sin seleccionar</span>}
                            </div>
                        </div>

                        {partnerName && (
                            <div className="summary-section">
                                <div className="summary-label">Partner</div>
                                <div className="summary-value">{partnerName}</div>
                            </div>
                        )}

                        <div className="summary-section">
                            <div className="summary-label">Modelo de Cobertura</div>
                            <div className="summary-value">
                                {coverageModel
                                    ? (coverageModel === 'wallet' ? '💳 Wallet' : '🏛️ Tradicional')
                                    : <span className="empty">Sin seleccionar</span>}
                            </div>
                        </div>

                        {coverageModel === 'wallet' && walletAnnual && (
                            <div className="summary-section">
                                <div className="summary-label">Wallet Anual</div>
                                <div className="summary-value">${walletAnnual}</div>
                            </div>
                        )}

                        <div className="sidebar-title">Verticales Seleccionadas</div>
                        {selectedVerticals.length === 0 ? (
                            <div className="sidebar-item empty">Sin verticales</div>
                        ) : (
                            selectedVerticals.map(vid => {
                                const v = VERTICALS.find(vert => vert.id === vid);
                                return (
                                    <div key={vid} className="sidebar-item">
                                        {v.icon} {v.name}
                                    </div>
                                );
                            })
                        )}

                        <div className="sidebar-title">Servicios Incluidos</div>
                        {selectedVerticals.length === 0 ? (
                            <div className="sidebar-item empty">Sin servicios</div>
                        ) : (
                            selectedVerticals.map(vid =>
                                CATEGORIES_BY_VERTICAL[vid].map(cat => (
                                    <div key={cat.id} className="sidebar-item">
                                        {cat.name}
                                    </div>
                                ))
                            )
                        )}

                        <div className="sidebar-title">Esquemas Asignados</div>
                        {Object.values(categorySchemes).filter(s => s).length === 0 ? (
                            <div className="sidebar-item empty">Sin esquemas</div>
                        ) : (
                            Object.entries(categorySchemes)
                                .filter(([, scheme]) => scheme)
                                .map(([catId, scheme]) => (
                                    <div key={catId} className="sidebar-item">
                                        {scheme}
                                    </div>
                                ))
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ProductTreeBuilder />, document.getElementById('root'));
    </script>
</body>
</html>
