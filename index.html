<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaitty System Map</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #060d1a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #060d1a 0%, #0f172a 100%);
      padding: 20px;
    }

    .login-box {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(to right, #38bdf8, #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-header p {
      color: #64748b;
      font-size: 14px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #cbd5e1;
    }

    .form-group input {
      padding: 12px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #38bdf8;
      background: #1e293b;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
    }

    .form-group input::placeholder {
      color: #475569;
    }

    .login-btn {
      padding: 12px 16px;
      background: linear-gradient(to right, #38bdf8, #0ea5e9);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-message {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      display: none;
      padding: 10px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 6px;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .error-message.show {
      display: block;
    }

    /* ── MAP CONTAINER ── */
    .map-container {
      display: none;
      width: 100%;
      height: 100vh;
    }

    .map-container.show {
      display: block;
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .logout-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .logout-overlay.show {
      display: flex;
    }

    .logout-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid #38bdf8;
      color: #38bdf8;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      z-index: 10000;
      transition: all 0.2s ease;
      display: none;
    }

    .logout-btn.show {
      display: block;
    }

    .logout-btn:hover {
      background: rgba(56, 189, 248, 0.2);
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>Vaitty</h1>
        <p>System Architecture Map</p>
      </div>

      <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Ingresa la contraseña"
            autocomplete="off"
            autofocus
          />
        </div>

        <div id="errorMessage" class="error-message"></div>

        <button type="submit" class="login-btn">Acceder</button>
      </form>
    </div>
  </div>

  <!-- MAP CONTAINER -->
  <div id="mapContainer" class="map-container">
    <iframe id="mapFrame" src="vaitty_map_v3.html"></iframe>
  </div>

  <!-- LOGOUT BUTTON -->
  <button id="logoutBtn" class="logout-btn" onclick="handleLogout()">Salir</button>

  <script>
    const CORRECT_PASSWORD = 'Vaitty2026';
    const PASSWORD_KEY = 'vaitty_map_auth';

    function handleLogin(event) {
      event.preventDefault();

      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');

      if (password === CORRECT_PASSWORD) {
        // Guardar autenticación en sessionStorage (se borra al cerrar pestaña)
        sessionStorage.setItem(PASSWORD_KEY, 'true');

        // Transición
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mapContainer').classList.add('show');
        document.getElementById('logoutBtn').classList.add('show');

        // Limpiar input
        document.getElementById('password').value = '';
      } else {
        // Mostrar error
        errorMsg.textContent = '❌ Contraseña incorrecta. Intenta de nuevo.';
        errorMsg.classList.add('show');
        document.getElementById('password').value = '';

        // Ocultar error después de 3 segundos
        setTimeout(() => {
          errorMsg.classList.remove('show');
        }, 3000);
      }
    }

    function handleLogout() {
      sessionStorage.removeItem(PASSWORD_KEY);
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('mapContainer').classList.remove('show');
      document.getElementById('logoutBtn').classList.remove('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }

    // Verificar si ya está autenticado al cargar la página
    window.addEventListener('load', () => {
      if (sessionStorage.getItem(PASSWORD_KEY)) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mapContainer').classList.add('show');
        document.getElementById('logoutBtn').classList.add('show');
      }
    });

    // Tecla ESC para logout
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && sessionStorage.getItem(PASSWORD_KEY)) {
        handleLogout();
      }
    });
  </script>
</body>
</html>
